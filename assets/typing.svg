<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60" width="100%">
  <defs>
    <linearGradient id="typingBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="60" rx="8" fill="url(#typingBg)" stroke="#00f2ff" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- Terminal prompt -->
  <text x="15" y="25" font-family="monospace" font-size="14" fill="#22c55e">$ </text>
  
  <!-- Typing animation text -->
  <text x="40" y="25" font-family="monospace" font-size="14" fill="#e2e8f0">
    <tspan id="typed-text">Building amazing web tools...</tspan>
  </text>
  
  <!-- Blinking cursor -->
  <rect x="280" y="14" width="8" height="16" fill="#00f2ff" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Second line typing -->
  <text x="15" y="48" font-family="monospace" font-size="12" fill="#94a3b8">
    <tspan>> Deploying faster than ever ⚡</tspan>
  </text>
  
  <!-- Status dot -->
  <circle cx="10" cy="5" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="25" cy="5" r="4" fill="#eab308" opacity="0.8"/>
  <circle cx="40" cy="5" r="4" fill="#22c55e" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
