<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400">
  <defs>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="200" cy="120" r="150" fill="#4f46e5" opacity="0.05"/>
  
  <!-- Desk -->
  <rect x="50" y="200" width="300" height="8" rx="3" fill="#374151"/>
  <rect x="100" y="208" width="200" height="4" rx="2" fill="#1f2937"/>
  
  <!-- Monitor -->
  <rect x="120" y="80" width="160" height="110" rx="6" fill="#1e1b4b" stroke="#4f46e5" stroke-width="2" filter="url(#screenGlow)"/>
  
  <!-- Screen content - code lines -->
  <rect x="130" y="92" width="80" height="3" rx="1" fill="#22c55e" opacity="0.7">
    <animate attributeName="width" values="80;95;80" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="100" width="60" height="3" rx="1" fill="#3b82f6" opacity="0.6"/>
  <rect x="140" y="108" width="100" height="3" rx="1" fill="#a855f7" opacity="0.5">
    <animate attributeName="width" values="100;115;100" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="116" width="70" height="3" rx="1" fill="#06b6d4" opacity="0.6"/>
  <rect x="140" y="124" width="90" height="3" rx="1" fill="#f59e0b" opacity="0.5">
    <animate attributeName="width" values="90;105;90" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="132" width="50" height="3" rx="1" fill="#ec4899" opacity="0.6"/>
  <rect x="140" y="140" width="110" height="3" rx="1" fill="#22c55e" opacity="0.4">
    <animate attributeName="width" values="110;125;110" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="148" width="75" height="3" rx="1" fill="#3b82f6" opacity="0.5"/>
  <rect x="140" y="156" width="85" height="3" rx="1" fill="#a855f7" opacity="0.6">
    <animate attributeName="width" values="85;100;85" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="164" width="55" height="3" rx="1" fill="#06b6d4" opacity="0.5"/>
  <rect x="140" y="172" width="95" height="3" rx="1" fill="#f59e0b" opacity="0.4">
    <animate attributeName="width" values="95;110;95" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Monitor stand -->
  <rect x="190" y="190" width="20" height="12" fill="#374151"/>
  <rect x="170" y="200" width="60" height="4" rx="2" fill="#374151"/>
  
  <!-- Keyboard -->
  <rect x="150" y="212" width="100" height="18" rx="3" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
  <g fill="#374151">
    <rect x="155" y="216" width="8" height="5" rx="1"/>
    <rect x="167" y="216" width="8" height="5" rx="1"/>
    <rect x="179" y="216" width="8" height="5" rx="1"/>
    <rect x="191" y="216" width="8" height="5" rx="1"/>
    <rect x="203" y="216" width="8" height="5" rx="1"/>
    <rect x="215" y="216" width="8" height="5" rx="1"/>
    <rect x="227" y="216" width="8" height="5" rx="1"/>
    <rect x="239" y="216" width="8" height="5" rx="1"/>
    <rect x="160" y="223" width="8" height="5" rx="1"/>
    <rect x="172" y="223" width="8" height="5" rx="1"/>
    <rect x="184" y="223" width="8" height="5" rx="1"/>
    <rect x="196" y="223" width="8" height="5" rx="1"/>
    <rect x="208" y="223" width="8" height="5" rx="1"/>
    <rect x="220" y="223" width="8" height="5" rx="1"/>
    <rect x="232" y="223" width="8" height="5" rx="1"/>
  </g>
  
  <!-- Coffee mug -->
  <rect x="290" y="195" width="22" height="18" rx="2" fill="#7c3aed" stroke="#a855f7" stroke-width="1"/>
  <path d="M 312 200 Q 320 200 320 206 Q 320 212 312 212" fill="none" stroke="#a855f7" stroke-width="2"/>
  <!-- Steam -->
  <path d="M 296 192 Q 298 186 296 180" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 301 193 Q 303 187 301 181" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- Floating code symbols -->
  <text x="80" y="60" font-family="monospace" font-size="20" fill="#22c55e" opacity="0.3">{"<"}{"{"}
    <animate attributeName="y" values="60;55;60" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="80" font-family="monospace" font-size="16" fill="#a855f7" opacity="0.25">{"</"}{">"}
    <animate attributeName="y" values="80;74;80" dur="3.5s" repeatCount="indefinite"/>
  </text>
  <text x="60" y="140" font-family="monospace" font-size="14" fill="#3b82f6" opacity="0.2">const
    <animate attributeName="x" values="60;65;60" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="330" y="150" font-family="monospace" font-size="14" fill="#06b6d4" opacity="0.2">=>
    <animate attributeName="y" values="150;144;150" dur="3.2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Screen flicker effect -->
  <rect x="120" y="80" width="160" height="110" rx="6" fill="#4f46e5" opacity="0">
    <animate attributeName="opacity" values="0;0.05;0;0;0.03;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
