<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="300" height="100" rx="12" fill="url(#cardBg)" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.5" filter="url(#cardGlow)"/>
  
  <!-- Animated corner accents -->
  <line x1="0" y1="5" x2="0" y2="25" stroke="#00f2ff" stroke-width="2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="5" y1="0" x2="25" y2="0" stroke="#00f2ff" stroke-width="2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="300" y1="75" x2="300" y2="95" stroke="#a855f7" stroke-width="2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="275" y1="100" x2="295" y2="100" stroke="#a855f7" stroke-width="2">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Content -->
  <text x="150" y="30" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8" letter-spacing="2">MINITOOLSZZ</text>
  
  <!-- Animated bars representing skills -->
  <rect x="30" y="45" width="60" height="6" rx="3" fill="#22c55e" opacity="0.8">
    <animate attributeName="width" values="60;65;60" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="100" y="45" width="50" height="6" rx="3" fill="#3b82f6" opacity="0.7">
    <animate attributeName="width" values="50;55;50" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="45" width="45" height="6" rx="3" fill="#a855f7" opacity="0.6">
    <animate attributeName="width" values="45;50;45" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="215" y="45" width="55" height="6" rx="3" fill="#06b6d4" opacity="0.7">
    <animate attributeName="width" values="55;60;55" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Status line -->
  <text x="150" y="75" text-anchor="middle" font-family="monospace" font-size="12" fill="#22c55e">
    ● online
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </text>
  
  <!-- Pulse dot -->
  <circle cx="60" cy="85" r="3" fill="#a855f7">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <text x="150" y="89" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">deploying • building • creating</text>
</svg>
