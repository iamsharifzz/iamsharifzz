<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" width="100%">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated Gradient for Text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1">
        <animate attributeName="offset" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1">
        <animate attributeName="offset" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1">
        <animate attributeName="offset" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Animated Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,242,255,0.05)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/>
      </path>
    </pattern>
    
    <!-- Particle Glow -->
    <radialGradient id="particleGlow">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00f2ff;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="particleGlow2">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="200" fill="url(#bg)"/>
  <rect width="1280" height="200" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" values="0,0;40,40" dur="20s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Animated Neon Line Top -->
  <line x1="0" y1="2" x2="1280" y2="2" stroke="#00f2ff" stroke-width="2" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Animated Neon Line Bottom -->
  <line x1="0" y1="198" x2="1280" y2="198" stroke="#a855f7" stroke-width="2" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Floating Particles -->
  <circle cx="100" cy="50" r="3" fill="url(#particleGlow)">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="150" r="2" fill="url(#particleGlow2)">
    <animate attributeName="cy" values="150;130;150" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="40" r="4" fill="url(#particleGlow)">
    <animate attributeName="cx" values="600;620;600" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="160" r="3" fill="url(#particleGlow2)">
    <animate attributeName="cy" values="160;140;160" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="60" r="2.5" fill="url(#particleGlow)">
    <animate attributeName="cy" values="60;40;60" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="170" r="3.5" fill="url(#particleGlow2)">
    <animate attributeName="cy" values="170;150;170" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="100" r="2" fill="url(#particleGlow)">
    <animate attributeName="cx" values="200;220;200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="80" r="3" fill="url(#particleGlow2)">
    <animate attributeName="cx" values="1000;980;1000" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Code bracket decorations (animated) -->
  <text x="30" y="120" font-family="monospace" font-size="40" fill="#00f2ff" opacity="0.15" filter="url(#glow)">
    {"<"}{"{"}{"</"}{">"}
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="1200" y="120" font-family="monospace" font-size="40" fill="#a855f7" opacity="0.15" filter="url(#glow)" text-anchor="end">
    {"</"}{">"}{"{"}{"}"}
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3.5s" repeatCount="indefinite"/>
  </text>
  
  <!-- Main Title Text -->
  <text x="640" y="85" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" filter="url(#strongGlow)" letter-spacing="4">
    MINITOOLSZZ
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtitle with typing cursor effect -->
  <text x="640" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#e2e8f0" opacity="0.9" letter-spacing="3">
    ⚡ Built for Speed &amp; Simplicity ⚡
  </text>
  
  <!-- Typing cursor animation -->
  <rect x="1055" y="112" width="3" height="26" fill="#00f2ff" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Animated scanning line -->
  <line x1="0" y1="0" x2="1280" y2="0" stroke="url(#textGrad)" stroke-width="1" opacity="0.3">
    <animate attributeName="y1" values="0;200;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;200;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
  </line>
  
  <!-- Bottom tagline -->
  <text x="640" y="175" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#94a3b8" letter-spacing="6" opacity="0.7">
    WEB TOOLS • UTILITIES • SPEED • DESIGN
  </text>
</svg>
